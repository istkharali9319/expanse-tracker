<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Expense Manager</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Logo -->
        <div class="login-logo">
            <i class="fa-solid fa-wallet"></i>
        </div>

        <h2>Expense Manager</h2>
        <p class="login-subtitle">Sign in to manage your finances</p>

        <!-- Flash messages -->
        {% if error %}
        <div class="alert alert-danger d-flex align-items-center gap-2" role="alert">
            <i class="fa-solid fa-circle-exclamation"></i>
            {{ error }}
        </div>
        {% endif %}

        {% if msg %}
        <div class="alert alert-info d-flex align-items-center gap-2" role="alert">
            <i class="fa-solid fa-circle-info"></i>
            {{ msg }}
        </div>
        {% endif %}

        <!-- Login Form -->
        <form action="/login" method="post">
            <div class="mb-4">
                <label for="username" class="form-label">
                    <i class="fa-solid fa-user me-1" style="color:#718096;"></i>Username
                </label>
                <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    required
                    autofocus
                >
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">
                    <i class="fa-solid fa-lock me-1" style="color:#718096;"></i>Password
                </label>
                <div class="position-relative">
                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                    >
                    <button
                        type="button"
                        class="btn position-absolute end-0 top-50 translate-middle-y pe-3"
                        style="background:none;border:none;color:#a0aec0;"
                        onclick="togglePassword()"
                        id="toggleBtn"
                    >
                        <i class="fa-solid fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
            </button>
        </form>

        <div class="login-hint">
            Default credentials: <code>admin</code> / <code>admin123</code>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        pwd.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
</body>
</html>
