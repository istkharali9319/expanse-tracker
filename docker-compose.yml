version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: expense_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Root@1234
      MYSQL_DATABASE: expense_manager
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: expense_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://root:Root%401234@db/expense_manager
      SECRET_KEY: expense-manager-secret-key-2026
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
